name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "installer.iss"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pyright + narrowing deps
        # 只装 pyright 做类型检查所需的包：
        #   - openai / anthropic：isinstance(..., openai.AuthenticationError) 等需要真实类型
        # 不装 pywin32（无 Linux 发行版）、pyaudio（需 portaudio 系统依赖）、
        # keyboard、pystray、pywebview；它们在 pyproject.toml [tool.pyright] 里
        # 被 reportMissingImports = "warning" 归为非致命警告。
        run: |
          pip install --upgrade pip
          pip install pyright openai anthropic

      - name: pyright
        run: pyright

  build-smoke:
    name: Build smoke test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller resvg_py
          pip install .

      - name: Inject CI version
        # 注意：scripts/build.py 的 generate_version_info 会把版本号拆成
        # 4 段整数写进 Windows 版本资源，因此这里必须用纯数字版本。
        run: python scripts/build.py --version 0.0.0 --no-build

      - name: Build with PyInstaller
        run: pyinstaller my_typeless.spec --clean --noconfirm

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "dist/MyTypeless.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed: $exe not found"
            exit 1
          }
          $sizeMB = (Get-Item $exe).Length / 1MB
          Write-Host "Build successful. Size: $([math]::Round($sizeMB, 2)) MB"
          if ($sizeMB -lt 10) {
            Write-Error "Executable suspiciously small ($sizeMB MB); likely broken bundle."
            exit 1
          }
