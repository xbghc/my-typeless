name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "installer.iss"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    # 当前代码库首次引入类型检查，存在历史遗留错误；
    # 先以 informational 方式运行，后续清理干净后再改为 blocking。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project + pyright
        run: |
          pip install --upgrade pip
          pip install .
          pip install pyright

      - name: pyright
        run: pyright

  build-smoke:
    name: Build smoke test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller resvg_py
          pip install .

      - name: Inject CI version
        run: python scripts/build.py --version 0.0.0.ci --no-build

      - name: Build with PyInstaller
        run: pyinstaller my_typeless.spec --clean --noconfirm

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "dist/MyTypeless.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed: $exe not found"
            exit 1
          }
          $sizeMB = (Get-Item $exe).Length / 1MB
          Write-Host "Build successful. Size: $([math]::Round($sizeMB, 2)) MB"
          if ($sizeMB -lt 10) {
            Write-Error "Executable suspiciously small ($sizeMB MB); likely broken bundle."
            exit 1
          }
